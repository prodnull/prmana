# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Rust (Cargo) - main project and all workspace members
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"
    groups:
      # Group minor + patch Rust updates into a single PR; majors stay
      # individual so a breaking API change (e.g. hmac 0.12 → 0.13) doesn't
      # mask the rest of the group.
      rust-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python DPoP library
  - package-ecosystem: "pip"
    directory: "/python-oauth-dpop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"
    groups:
      python-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Go DPoP library
  - package-ecosystem: "gomod"
    directory: "/go-oauth-dpop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(go)"
    groups:
      go-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Java DPoP library (Gradle)
  - package-ecosystem: "gradle"
    directory: "/java-oauth-dpop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps(java)"
    groups:
      java-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
