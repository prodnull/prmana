name: Fuzz Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 3 AM UTC for deeper fuzzing
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Fuzzing duration per target (seconds)'
        required: false
        default: '60'

# Restrict permissions for security (OSSF Scorecard requirement)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_token_parser
          - fuzz_policy_parser
          - fuzz_username_mapper
          # dpop_proof requires prmana-agent which has more deps
    env:
      # Use environment variable to safely handle user input
      FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || '30' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libssl-dev pkg-config

      - name: Install cargo-fuzz
        # Avoids `cargo install cargo-fuzz --locked` pinning to rustix 0.36.5
        # which fails to compile on current Rust toolchains. taiki-e fetches a
        # prebuilt binary, sidestepping the from-source rebuild.
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer
        run: |
          echo "Fuzzing ${{ matrix.target }} for ${FUZZ_DURATION}s"
          cd fuzz
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time="${FUZZ_DURATION}" \
            -max_len=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}
            fuzz/corpus/${{ matrix.target }}
