name: Fuzz Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 3 AM UTC for deeper fuzzing
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      fuzz_duration:
        description: 'Fuzzing duration per target (seconds)'
        required: false
        default: '60'

# Restrict permissions for security (OSSF Scorecard requirement)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_token_parser
          - fuzz_policy_parser
          - fuzz_username_mapper
          # dpop_proof requires prmana-agent which has more deps
    env:
      # Use environment variable to safely handle user input
      FUZZ_DURATION: ${{ github.event.inputs.fuzz_duration || '30' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev libssl-dev pkg-config

      - name: Install cargo-fuzz
        # Avoids `cargo install cargo-fuzz --locked` pinning to rustix 0.36.5
        # which fails to compile on current Rust toolchains. taiki-e fetches a
        # prebuilt binary, sidestepping the from-source rebuild.
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer
        env:
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          echo "Fuzzing ${FUZZ_TARGET} for ${FUZZ_DURATION}s"
          cd fuzz
          # Pin --target to gnu host triple. Newer cargo-fuzz defaults to musl,
          # which would require installing that target into the toolchain.
          cargo +nightly fuzz run "${FUZZ_TARGET}" \
            --target x86_64-unknown-linux-gnu -- \
            -max_total_time="${FUZZ_DURATION}" \
            -max_len=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}
            fuzz/corpus/${{ matrix.target }}
